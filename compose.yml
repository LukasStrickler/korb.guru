# Local dev only: Postgres + Qdrant. Do not deploy this file for production DBs.
# Production (Coolify): use one-click Postgres and Qdrant; set DATABASE_URL and QDRANT_URL on the API.
# Credentials below are for local use only; .env.example matches (user/password/myapp).
# Commands: pnpm db:up | db:ready | db:down | db:migrate | db:seed | db:reset (see .docs/guides/database.md)
name: korb-db

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d myapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: null
  qdrant_data: null
